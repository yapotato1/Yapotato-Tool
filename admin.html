<!DOCTYPE html>
<html lang="zh-CN" style="color-scheme:light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理面板 - Yapotato Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="PNG/frog.png" type="image/png">
  <style>
    :root {
      --bg: #F4F5F7;
      --card: #FFFFFF;
      --card-border: #E5E7EB;
      --text: #18191C;
      --text2: #999AAA;
      --accent: #00A1D6;
      --accent-dim: rgba(0, 161, 214, 0.08);
      --danger: #FF5577;
      --danger-dim: rgba(255, 85, 119, 0.1);
      --success: #34C759;
      --success-dim: rgba(52, 199, 89, 0.1);
      --warning: #FF9500;
      --warning-dim: rgba(255, 149, 0, 0.1);
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.015) 2px, rgba(0, 0, 0, 0.015) 4px);
    }

    /* ========== HEADER ========== */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--card-border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      image-rendering: pixelated;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .header-version {
      font-size: 11px;
      color: var(--text2);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .header-status {
      display: flex;
      gap: 12px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text2);
      padding: 4px 10px;
      background: var(--bg);
      border-radius: 6px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 2px var(--success-dim);
    }

    .status-dot.off {
      background: var(--danger);
      box-shadow: 0 0 0 2px var(--danger-dim);
    }

    .status-dot.warn {
      background: var(--warning);
      box-shadow: 0 0 0 2px var(--warning-dim);
    }

    /* ========== LOG AREA ========== */
    .log-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 16px 24px;
    }

    .log-card {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .log-toolbar {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--card-border);
      flex-shrink: 0;
    }

    .log-toolbar-left {
      display: flex;
      gap: 6px;
    }

    .log-btn {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 12px;
      font-weight: 500;
      background: var(--bg);
      border: 1px solid var(--card-border);
      color: var(--text2);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s ease;
    }

    .log-btn:hover {
      background: var(--card);
      border-color: var(--accent);
      color: var(--accent);
    }

    .log-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .log-count {
      font-size: 12px;
      color: var(--text2);
    }

    .log-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.8;
      font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
      background: #FAFBFC;
    }

    .log-area::-webkit-scrollbar {
      width: 5px;
    }

    .log-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .log-area::-webkit-scrollbar-thumb {
      background: var(--card-border);
      border-radius: 3px;
    }

    .log-line {
      padding: 1px 0;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-line .time {
      color: var(--text2);
    }

    .log-line .level {
      font-weight: 600;
      min-width: 52px;
      display: inline-block;
    }

    .log-line.info .level {
      color: var(--accent);
    }

    .log-line.warning .level {
      color: var(--warning);
    }

    .log-line.error .level {
      color: var(--danger);
    }

    .log-line.info {
      color: var(--text);
    }

    .log-line.warning {
      color: #B86E00;
    }

    .log-line.error {
      color: var(--danger);
    }

    /* ========== CONTROLS ========== */
    .controls {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .controls-info {
      font-size: 12px;
      color: var(--text2);
    }

    .controls-actions {
      display: flex;
      gap: 10px;
    }

    /* ========== 3D BUTTONS ========== */
    .btn {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: all .15s ease;
      position: relative;
    }

    .btn-back {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--card-border);
      box-shadow:
        0 2px 0 var(--card-border),
        0 4px 8px rgba(0, 0, 0, 0.04);
    }

    .btn-back:hover {
      background: var(--card);
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
      box-shadow:
        0 3px 0 var(--card-border),
        0 6px 12px rgba(0, 0, 0, 0.06);
    }

    .btn-back:active {
      transform: translateY(1px);
      box-shadow:
        0 1px 0 var(--card-border),
        0 2px 4px rgba(0, 0, 0, 0.04);
    }

    .btn-danger {
      background: linear-gradient(180deg, #FF6B81 0%, #FF4466 100%);
      color: #FFFFFF;
      box-shadow:
        0 2px 0 #CC3355,
        0 4px 12px rgba(255, 68, 102, 0.25);
    }

    .btn-danger:hover {
      background: linear-gradient(180deg, #FF7B91 0%, #FF5476 100%);
      transform: translateY(-1px);
      box-shadow:
        0 3px 0 #CC3355,
        0 6px 16px rgba(255, 68, 102, 0.35);
    }

    .btn-danger:active {
      transform: translateY(1px);
      box-shadow:
        0 1px 0 #CC3355,
        0 2px 6px rgba(255, 68, 102, 0.2);
    }

    /* ========== MODAL ========== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--danger);
      margin-bottom: 8px;
    }

    .modal-text {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn-cancel {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--card-border);
      box-shadow: 0 2px 0 var(--card-border);
    }

    .btn-cancel:hover {
      background: var(--card);
      border-color: var(--text2);
    }

    .btn-cancel:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 var(--card-border);
    }

    .btn-confirm {
      background: linear-gradient(180deg, #FF6B81 0%, #FF4466 100%);
      color: #FFFFFF;
      box-shadow:
        0 2px 0 #CC3355,
        0 4px 12px rgba(255, 68, 102, 0.25);
    }

    .btn-confirm:hover {
      background: linear-gradient(180deg, #FF7B91 0%, #FF5476 100%);
      transform: translateY(-1px);
      box-shadow:
        0 3px 0 #CC3355,
        0 6px 16px rgba(255, 68, 102, 0.35);
    }

    .btn-confirm:active {
      transform: translateY(1px);
      box-shadow:
        0 1px 0 #CC3355,
        0 2px 6px rgba(255, 68, 102, 0.2);
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        gap: 10px;
        align-items: flex-start;
      }

      .header-status {
        flex-wrap: wrap;
        gap: 8px;
      }

      .controls {
        flex-direction: column;
        gap: 10px;
      }

      .controls-actions {
        width: 100%;
      }

      .controls-actions .btn {
        flex: 1;
      }
    }
  </style>
</head>

<body>
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <img src="PNG/logo.webp" class="header-logo" alt="logo">
      <span class="header-title">Yapotato Tool</span>
      <span class="header-version" id="version">v--</span>
    </div>
    <div class="header-status" id="statusBar">
      <div class="status-item">
        <div class="status-dot" id="dotBrowser"></div>
        <span>浏览器</span>
      </div>
      <div class="status-item">
        <div class="status-dot" id="dotFfmpeg"></div>
        <span>FFmpeg</span>
      </div>
      <div class="status-item">
        <div class="status-dot" id="dotCookie"></div>
        <span>Cookie</span>
      </div>
    </div>
  </div>

  <!-- LOG AREA -->
  <div class="log-container">
    <div class="log-card">
      <div class="log-toolbar">
        <div class="log-toolbar-left">
          <button class="log-btn active" id="btnAutoScroll" onclick="toggleAutoScroll()">自动滚动</button>
          <button class="log-btn" onclick="clearLogs()">清空</button>
        </div>
        <div class="log-count"><span id="logCount">0</span> 条日志</div>
      </div>
      <div class="log-area" id="logArea"></div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="controls-info">双击 YM 图标可重新打开此面板</div>
    <div class="controls-actions">
      <button class="btn btn-back" onclick="window.location.href='/'">返回首页</button>
      <button class="btn btn-danger" onclick="showShutdownModal()">停止服务</button>
    </div>
  </div>

  <!-- SHUTDOWN MODAL -->
  <div class="modal-overlay" id="shutdownModal">
    <div class="modal">
      <div class="modal-title">确认关闭</div>
      <div class="modal-text">
        将停止服务器并清理临时文件<br>
        浏览器自动化实例将被关闭
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="hideShutdownModal()">取消</button>
        <button class="btn btn-confirm" id="btnConfirmShutdown" onclick="shutdown()">确认关闭</button>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    var autoScroll = true;
    var logCount = 0;
    var logArea = document.getElementById('logArea');
    var logCountEl = document.getElementById('logCount');

    function toggleAutoScroll() {
      autoScroll = !autoScroll;
      document.getElementById('btnAutoScroll').classList.toggle('active', autoScroll);
      if (autoScroll) scrollToBottom();
    }

    function scrollToBottom() {
      logArea.scrollTop = logArea.scrollHeight;
    }

    function clearLogs() {
      logArea.innerHTML = '';
      logCount = 0;
      logCountEl.textContent = '0';
    }

    function addLog(line) {
      var div = document.createElement('div');
      div.className = 'log-line';
      var match = line.match(/^\[([^\]]+)\]\s*(INFO|WARNING|ERROR|DEBUG):\s*(.*)$/);
      if (match) {
        div.className = 'log-line ' + match[2].toLowerCase();
        div.innerHTML = '<span class="time">[' + match[1] + ']</span> <span class="level">' + match[2] + ':</span> ' + escapeHtml(match[3]);
      } else {
        div.textContent = line;
      }
      logArea.appendChild(div);
      logCount++;
      logCountEl.textContent = logCount;
      if (autoScroll) scrollToBottom();
    }

    function escapeHtml(s) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }

    function updateStatus(data) {
      document.getElementById('version').textContent = 'v' + data.version;
      document.getElementById('dotBrowser').className = 'status-dot' + (data.browser ? '' : ' off');
      document.getElementById('dotFfmpeg').className = 'status-dot' + (data.ffmpeg ? '' : ' off');
      document.getElementById('dotCookie').className = 'status-dot' + (data.cookies ? '' : ' warn');
    }

    function connectLogStream() {
      var es = new EventSource('/api/admin/logs');
      es.onmessage = function (e) {
        if (e.data === '[DONE]') return;
        addLog(e.data);
      };
      es.onerror = function () {
        addLog('[系统] 连接断开，3秒后重连...');
        es.close();
        setTimeout(connectLogStream, 3000);
      };
    }

    function fetchStatus() {
      fetch('/api/admin/status')
        .then(function (r) { return r.json(); })
        .then(function (data) { if (data.success) updateStatus(data.data); })
        .catch(function () { });
    }

    function showShutdownModal() {
      document.getElementById('shutdownModal').classList.add('show');
    }

    function hideShutdownModal() {
      document.getElementById('shutdownModal').classList.remove('show');
    }

    function shutdown() {
      var btn = document.getElementById('btnConfirmShutdown');
      btn.textContent = '关闭中...';
      btn.disabled = true;
      fetch('/api/admin/shutdown', { method: 'POST' })
        .then(function () {
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Noto Sans SC,sans-serif;color:#FF5577;font-size:16px;text-align:center;">服务已停止<br><br><a href="/" style="color:#00A1D6;text-decoration:none;">刷新页面</a></div>';
        })
        .catch(function () {
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Noto Sans SC,sans-serif;color:#34C759;font-size:16px;">服务已停止</div>';
        });
    }

    fetchStatus();
    setInterval(fetchStatus, 5000);
    connectLogStream();
  </script>
</body>

</html>
