<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>无水印视频下载</title>
  <link rel="icon" href="PNG/frog.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="preload" href="PNG/frog.png" as="image">
  <style>
    :root {
      --bg: #d8eecc;
      --dkgreen: #3a7a2a;
      --pink: #e8607a;
      --dkpink: #b84060;
      --text: #2a4a1a;
      --gold: #f0c040;
      --spacing-section: 24px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at center, rgba(255, 255, 255, .15) 0%, transparent 70%),
        linear-gradient(rgba(60, 120, 40, .07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(60, 120, 40, .07) 1px, transparent 1px);
      background-size: auto, 16px 16px, 16px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Press Start 2P', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 4vw, 28px);
    }

    /* ================================================================
       PIXEL BLOCKS (Background Decorations)
       ================================================================ */
    .pixel-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      image-rendering: pixelated;
    }

    .pixel-block {
      position: absolute;
      background: rgba(60, 120, 40, .10);
      animation: pixel-drift 12s ease-in-out infinite;
      animation-delay: calc(var(--drift-delay, 0) * 1s);
    }

    .pixel-block.lg {
      width: 16px;
      height: 16px;
      box-shadow:
        16px 0 rgba(60, 120, 40, .10),
        32px 0 rgba(60, 120, 40, .10),
        48px 0 rgba(60, 120, 40, .10),
        0 16px rgba(60, 120, 40, .10),
        16px 16px rgba(60, 120, 40, .10),
        32px 16px rgba(60, 120, 40, .10),
        48px 16px rgba(60, 120, 40, .10);
    }

    .pixel-block.sm {
      width: 16px;
      height: 16px;
      box-shadow:
        16px 0 rgba(60, 120, 40, .10),
        0 16px rgba(60, 120, 40, .10),
        16px 16px rgba(60, 120, 40, .10),
        32px 16px rgba(60, 120, 40, .10);
    }

    .pixel-block.xs {
      width: 4px;
      height: 4px;
      box-shadow:
        4px 0 rgba(60, 120, 40, .10),
        0 4px rgba(60, 120, 40, .10),
        4px 4px rgba(60, 120, 40, .10);
    }

    @keyframes pixel-drift {

      0%,
      100% {
        transform: translate(0, 0);
      }

      25% {
        transform: translate(8px, -12px);
      }

      50% {
        transform: translate(-4px, 8px);
      }

      75% {
        transform: translate(12px, 4px);
      }
    }

    /* ================================================================
       GOLD SPARKLE PARTICLES
       ================================================================ */
    .sparkle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--gold);
      box-shadow:
        2px 0 var(--gold),
        0 2px var(--gold),
        2px 2px var(--gold),
        0 -2px var(--gold),
        -2px 0 var(--gold);
      animation: sparkle 2.4s ease-in-out infinite;
      opacity: 0;
      pointer-events: none;
    }

    .sparkle:nth-child(1) {
      top: 22%;
      left: 28%;
      animation-delay: .2s;
    }

    .sparkle:nth-child(2) {
      top: 35%;
      right: 22%;
      animation-delay: .9s;
    }

    .sparkle:nth-child(3) {
      top: 60%;
      left: 15%;
      animation-delay: 1.6s;
    }

    .sparkle:nth-child(4) {
      bottom: 30%;
      right: 30%;
      animation-delay: 2.1s;
    }

    .sparkle:nth-child(5) {
      top: 15%;
      left: 55%;
      animation-delay: .5s;
    }

    @keyframes sparkle {

      0%,
      100% {
        opacity: 0;
        transform: scale(.5);
      }

      30% {
        opacity: .9;
        transform: scale(1);
      }

      60% {
        opacity: .5;
        transform: scale(.7);
      }
    }

    /* ================================================================
       ENTRANCE ANIMATIONS
       ================================================================ */
    @keyframes pixel-reveal {
      0% {
        opacity: 0;
        transform: scale(.8);
        clip-path: inset(0 100% 0 0);
      }

      60% {
        opacity: 1;
        transform: scale(1.02);
        clip-path: inset(0 0% 0 0);
      }

      100% {
        opacity: 1;
        transform: scale(1);
        clip-path: inset(0 0% 0 0);
      }
    }

    @keyframes pixel-pop {
      0% {
        opacity: 0;
        transform: scale(.5);
      }

      50% {
        opacity: 1;
        transform: scale(1.08);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slide-in-right {
      0% {
        opacity: 0;
        transform: translateX(40px);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fade-in {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    .anim-reveal {
      animation: pixel-reveal .6s ease-out .2s both;
    }

    .anim-pop {
      animation: pixel-pop .5s cubic-bezier(.34, 1.56, .64, 1) both;
    }

    .anim-fade {
      animation: fade-in .4s ease-out both;
    }

    .anim-slide-right {
      animation: slide-in-right .4s ease-out both;
    }

    /* ================================================================
       TITLE
       ================================================================ */
    .title {
      position: relative;
      z-index: 10;
      color: var(--text);
      font-size: clamp(1.1rem, 4vw, 2.5rem);
      line-height: 2.2;
      text-align: center;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, .1);
      letter-spacing: 2px;
    }

    .title span {
      color: var(--dkgreen);
    }

    .title::after {
      content: '';
      display: block;
      width: 0;
      height: 4px;
      margin: 2px auto 0;
      background: var(--dkgreen);
      box-shadow:
        4px 0 var(--dkgreen),
        8px 0 var(--dkgreen),
        12px 0 var(--dkgreen),
        16px 0 var(--dkgreen),
        -4px 0 var(--dkgreen),
        -8px 0 var(--dkgreen),
        -12px 0 var(--dkgreen),
        -16px 0 var(--dkgreen);
      animation: underline-grow .5s ease-out .7s both;
    }

    @keyframes underline-grow {
      0% {
        width: 0;
        opacity: 0;
      }

      100% {
        width: 40px;
        opacity: 1;
      }
    }

    /* ================================================================
       FROG
       ================================================================ */
    #frogWrap {
      position: relative;
      z-index: 10;
      cursor: pointer;
    }

    #frogWrap:focus-visible {
      outline: 2px dashed var(--dkgreen);
      outline-offset: 8px;
    }

    #frogCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Frog Idle Bob */
    .frog-idle {
      animation: frog-idle 2.8s ease-in-out infinite;
    }

    @keyframes frog-idle {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-4px);
      }
    }

    /* Frog Boing (Hover) */
    .frog-boing {
      animation: frog-boing .45s cubic-bezier(.34, 1.56, .64, 1) !important;
    }

    @keyframes frog-boing {
      0% {
        transform: translateY(0) scale(1);
      }

      20% {
        transform: translateY(-24px) scale(1.03, .94);
      }

      45% {
        transform: translateY(-6px) scale(.96, 1.06);
      }

      70% {
        transform: translateY(-2px) scale(1.01, .98);
      }

      100% {
        transform: translateY(0) scale(1);
      }
    }

    /* Frog Dance (Double-click) */
    .frog-dance {
      animation: frog-dance .8s cubic-bezier(.34, 1.56, .64, 1) !important;
    }

    @keyframes frog-dance {
      0% {
        transform: translateY(0) rotate(0);
      }

      12% {
        transform: translateY(-12px) rotate(-3deg);
      }

      25% {
        transform: translateY(-4px) rotate(3deg);
      }

      37% {
        transform: translateY(-16px) rotate(-2deg);
      }

      50% {
        transform: translateY(-6px) rotate(5deg);
      }

      62% {
        transform: translateY(-14px) rotate(-4deg);
      }

      75% {
        transform: translateY(-8px) rotate(2deg);
      }

      87% {
        transform: translateY(-4px) rotate(-1deg);
      }

      100% {
        transform: translateY(0) rotate(0);
      }
    }

    /* Frog Pop (Entrance) */
    .frog-pop {
      animation: pixel-pop .5s cubic-bezier(.34, 1.56, .64, 1) .5s both !important;
    }

    /* ================================================================
       SPEECH BUBBLE
       ================================================================ */
    .speech-bubble {
      position: absolute;
      top: -90px;
      right: -10px;
      background: #fff;
      color: var(--text);
      font-size: 1.4rem;
      font-family: 'Press Start 2P', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 14px 24px;
      border-radius: 16px;
      border: 4px solid var(--dkgreen);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      z-index: 20;
    }

    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -16px;
      right: 36px;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 16px solid var(--dkgreen);
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -10px;
      right: 40px;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid #fff;
      z-index: 1;
    }

    .speech-bubble.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    /* ================================================================
       START BUTTON
       ================================================================ */
    #startBtn {
      position: relative;
      z-index: 10;
      padding: 20px 48px;
      font-size: clamp(0.8rem, 2.5vw, 1.4rem);
      font-family: 'Press Start 2P', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      background-color: var(--pink);
      background-image:
        /* 4-tone pixel surface */
        linear-gradient(to bottom,
          #ffcdd6 0%, #ffcdd6 22%,
          /* top highlight */
          #e8607a 22%, #e8607a 58%,
          /* base pink */
          #b84060 58%, #b84060 80%,
          /* dark pink */
          #8a2a3e 80%, #8a2a3e 100%),
        /* deep shadow */
        /* Grid texture */
        linear-gradient(rgba(255, 255, 255, .15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .15) 1px, transparent 1px),
        /* Shimmer */
        linear-gradient(120deg,
          transparent 20%,
          rgba(255, 255, 255, .22) 40%,
          rgba(255, 255, 255, .45) 48%,
          rgba(255, 255, 255, .22) 56%,
          transparent 75%);
      background-size: 100% 100%, 16px 16px, 16px 16px, 220% 100%;
      background-repeat: no-repeat, repeat, repeat, no-repeat;
      background-position: 0 0, 0 0, 0 0, 100% 0;
      border: none;
      cursor: pointer;
      letter-spacing: 2px;
      /* Pixel border: box-shadow inside the clip-path */
      box-shadow: inset 2px 2px 0 rgba(255, 255, 255, .3), inset -2px -2px 0 rgba(0, 0, 0, .15);
      transition:
        transform .3s cubic-bezier(.34, 1.56, .64, 1),
        color .2s ease,
        text-shadow .2s ease;
      clip-path: polygon(8px 0, calc(100% - 8px) 0,
          100% 8px, 100% calc(100% - 8px),
          calc(100% - 8px) 100%,
          8px 100%,
          0 calc(100% - 8px), 0 8px);
      animation: shimmer-sweep 1.5s linear infinite;
      animation-play-state: paused;
    }

    /* Pixel 3D shadow — uses drop-shadow to follow clip-path contour */
    #startBtn::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: -1;
      background: var(--pink);
      clip-path: polygon(8px 0, calc(100% - 8px) 0,
          100% 8px, 100% calc(100% - 8px),
          calc(100% - 8px) 100%,
          8px 100%,
          0 calc(100% - 8px), 0 8px);
      filter:
        drop-shadow(4px 4px 0 var(--dkpink)) drop-shadow(6px 6px 0 rgba(0, 0, 0, .15)) drop-shadow(8px 8px 0 var(--dkpink)) drop-shadow(10px 10px 0 rgba(0, 0, 0, .22));
      transition: filter .3s cubic-bezier(.34, 1.56, .64, 1);
      pointer-events: none;
    }

    /* LED glow ring */
    #startBtn::before {
      content: '';
      position: absolute;
      inset: -10px;
      background: var(--pink);
      clip-path: polygon(14px 0, calc(100% - 14px) 0,
          100% 14px, 100% calc(100% - 14px),
          calc(100% - 14px) 100%,
          14px 100%,
          0 calc(100% - 14px), 0 14px);
      opacity: 0;
      z-index: -2;
      transition: opacity .35s ease;
      pointer-events: none;
      will-change: opacity, transform, filter;
      filter:
        drop-shadow(0 0 6px rgba(232, 96, 122, .7)) drop-shadow(0 0 14px rgba(232, 96, 122, .5)) drop-shadow(0 0 30px rgba(232, 96, 122, .3));
    }

    #startBtn:hover {
      will-change: transform;
      transform: translate(-4px, -6px);
      color: #fff6e0;
      text-shadow: 0 0 12px rgba(240, 192, 64, .3);
      animation-play-state: running;
    }

    #startBtn:hover::after {
      filter:
        drop-shadow(6px 6px 0 var(--dkpink)) drop-shadow(9px 9px 0 rgba(0, 0, 0, .18)) drop-shadow(12px 12px 0 var(--dkpink)) drop-shadow(16px 16px 0 rgba(0, 0, 0, .28));
    }

    #startBtn:hover::before {
      opacity: .7;
      animation: glow-breathe 1.8s ease-in-out infinite;
    }

    #startBtn:active {
      transform: translate(2px, 4px) !important;
      animation-play-state: paused !important;
      color: #fff !important;
      text-shadow: none !important;
      transition: transform .06s !important;
    }

    #startBtn:active::after {
      filter: drop-shadow(1px 1px 0 var(--dkpink)) drop-shadow(2px 2px 0 rgba(0, 0, 0, .18)) !important;
      transition: filter .06s !important;
    }

    #startBtn:active::before {
      opacity: 0 !important;
      animation: none !important;
    }

    #startBtn:focus-visible {
      outline: 3px solid var(--dkgreen);
      outline-offset: 4px;
    }

    @keyframes glow-breathe {

      0%,
      100% {
        opacity: .5;
        transform: scale(1);
        filter:
          drop-shadow(0 0 6px rgba(232, 96, 122, .7)) drop-shadow(0 0 14px rgba(232, 96, 122, .5)) drop-shadow(0 0 30px rgba(232, 96, 122, .3));
      }

      50% {
        opacity: .9;
        transform: scale(1.04);
        filter:
          drop-shadow(0 0 10px rgba(232, 96, 122, .9)) drop-shadow(0 0 22px rgba(232, 96, 122, .65)) drop-shadow(0 0 44px rgba(232, 96, 122, .4)) drop-shadow(2px 2px 0 rgba(240, 192, 64, .5));
      }
    }

    @keyframes shimmer-sweep {
      0% {
        background-position: 0 0, 0 0, 100% 0;
      }

      100% {
        background-position: 0 0, 0 0, -120% 0;
      }
    }

    /* ================================================================
       YM CORNER INTERACTIONS
       ================================================================ */
    @keyframes ym-idle {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes ym-wiggle {

      0%,
      100% {
        transform: translateY(0) rotate(0) scale(1);
      }

      25% {
        transform: translateY(-2px) rotate(-2deg) scale(1.04);
      }

      75% {
        transform: translateY(-2px) rotate(2deg) scale(1.04);
      }
    }

    @keyframes ym-spin {
      0% {
        transform: translateY(0) scale(1);
      }

      20% {
        transform: translateY(-18px) scale(1.03, .94);
      }

      45% {
        transform: translateY(-5px) scale(.96, 1.06);
      }

      70% {
        transform: translateY(-2px) scale(1.01, .98);
      }

      100% {
        transform: translateY(0) scale(1);
      }
    }

    /* YM Tooltip (::after pseudo-element) */
    .ym-corner::after {
      content: attr(data-tooltip);
      position: absolute;
      right: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, .78);
      color: var(--gold);
      font-family: 'Press Start 2P', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 0.6rem;
      padding: 6px 12px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s ease;
    }

    .ym-corner.tooltip-show::after {
      opacity: 1;
    }

    /* ================================================================
       VERSION TEXT (底部)
       ================================================================ */
    .version {
      position: relative;
      z-index: 10;
      color: var(--dkgreen);
      font-size: clamp(0.55rem, 1.5vw, 0.85rem);
      font-family: 'Press Start 2P', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      opacity: .75;
      letter-spacing: 1px;
      padding: 16px 0 20px;
    }

    /* ================================================================
       YM CORNER
       ================================================================ */
    .ym-corner {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      cursor: pointer;
      transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
      animation: ym-idle 3s ease-in-out infinite;
    }

    .ym-corner img {
      display: block;
      height: clamp(60px, 8vw, 100px);
      image-rendering: pixelated;
    }

    .ym-corner:hover {
      animation: ym-wiggle .5s ease-in-out infinite;
    }

    .ym-corner.spin {
      animation: ym-spin .6s cubic-bezier(.34, 1.56, .64, 1) !important;
    }

    /* ================================================================
       RESPONSIVE
       ================================================================ */
    @media (max-width: 399px) {
      .title {
        font-size: clamp(0.85rem, 4vw, 1rem);
        line-height: 1.8;
      }

      .pixel-block.lg {
        display: none;
      }

      .pixel-block.sm {
        display: none;
      }

      #startBtn {
        padding: 16px 32px;
        font-size: clamp(0.65rem, 3vw, 0.8rem);
      }

      .speech-bubble {
        font-size: 1rem;
        padding: 10px 16px;
        top: -70px;
      }
    }


    /* ================================================================
       REDUCED MOTION
       ================================================================ */
    @media (prefers-reduced-motion: reduce) {
      .speech-bubble {
        transition: none;
      }

      .pixel-block {
        animation: none;
      }

      .sparkle {
        animation: none;
        display: none;
      }

      .anim-reveal {
        animation: none;
        opacity: 1;
      }

      .anim-pop {
        animation: none;
        opacity: 1;
      }

      .anim-fade {
        animation: none;
        opacity: 1;
      }

      .anim-slide-right {
        animation: none;
        opacity: 1;
        transform: none;
      }

      .title::after {
        animation: none;
        width: 40px;
        opacity: 1;
      }

      .frog-idle {
        animation: none;
      }

      .frog-boing {
        animation: none !important;
        transform: none !important;
      }

      .frog-dance {
        animation: none !important;
        transform: none !important;
      }

      .frog-pop {
        animation: none !important;
        opacity: 1;
        transform: none;
      }

      #startBtn::before {
        animation: none;
        opacity: 0;
        display: none;
      }

      #startBtn {
        animation: none !important;
        animation-play-state: paused !important;
      }

      #startBtn:hover {
        transform: none;
        color: var(--gold);
        outline: 3px solid var(--gold);
        outline-offset: 3px;
      }

      #startBtn:hover::after {
        filter: drop-shadow(4px 4px 0 var(--dkpink)) drop-shadow(8px 8px 0 rgba(0, 0, 0, .18));
        transition: none;
      }

      #startBtn:active {
        transform: none !important;
      }

      .ym-corner {
        animation: none !important;
      }

      .ym-corner:hover {
        animation: none !important;
        transform: scale(1.1);
        outline: 3px solid var(--dkgreen);
        outline-offset: 3px;
      }

      .ym-corner.spin {
        animation: none !important;
        transform: scale(1.1);
      }

      .ym-corner::after {
        transition: none;
      }
    }
  </style>
</head>

<body>

  <div class="pixel-bg">
    <div class="pixel-block lg" style="top:6%;left:5%;--drift-delay:0"></div>
    <div class="pixel-block sm" style="top:55%;right:6%;--drift-delay:1.2"></div>
    <div class="pixel-block lg" style="bottom:10%;left:18%;--drift-delay:2.5"></div>
    <div class="pixel-block sm" style="top:30%;left:60%;--drift-delay:.6"></div>
    <div class="pixel-block lg" style="top:18%;right:14%;--drift-delay:3.8"></div>
    <div class="pixel-block sm" style="bottom:28%;right:22%;--drift-delay:1.9"></div>
    <div class="pixel-block xs" style="top:12%;left:42%;--drift-delay:4.2"></div>
    <div class="pixel-block xs" style="top:72%;left:8%;--drift-delay:.3"></div>
    <div class="pixel-block xs" style="bottom:20%;right:8%;--drift-delay:2.8"></div>
    <div class="pixel-block lg" style="top:48%;left:10%;--drift-delay:5.1"></div>
    <div class="pixel-block xs" style="top:8%;right:35%;--drift-delay:3.5"></div>
    <div class="pixel-block sm" style="bottom:35%;right:12%;--drift-delay:4.7"></div>

    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
  </div>

  <div class="main-content">
    <h1 class="title anim-reveal">Yapotato Tool<br><span>Watermark Remover</span></h1>

    <div id="frogWrap" class="frog-pop" tabindex="0" aria-label="青蛙吉祥物，点击交互" role="button">
      <canvas id="frogCanvas"></canvas>
      <div class="speech-bubble" id="speechBubble">呱</div>
    </div>

    <button id="startBtn" class="anim-pop" style="animation-delay:.8s">▶ 开始使用</button>
  </div>

<!-- VERSION: 改代码时同步 server.py 的 VERSION -->
  <p class="version anim-fade" style="animation-delay:1.3s">v3.9.1 · 支持抖音 & 哔哩哔哩</p>

  <div class="ym-corner anim-slide-right" id="ymCorner" style="animation-delay:1.5s">
    <img src="PNG/YM.png" alt="YM">
  </div>

  <script>
    (function () {
      'use strict';

      /* ================================================================
         FROG CANVAS
         ================================================================ */
      var fCvs = document.getElementById('frogCanvas');
      var fCtx = fCvs.getContext('2d');
      fCtx.imageSmoothingEnabled = false;
      var DISPLAY_SIZE = 280;

      var frogImg = new Image();
      frogImg.onload = function () {
        var scale = Math.min(DISPLAY_SIZE / frogImg.width, DISPLAY_SIZE / frogImg.height);
        var w = Math.floor(frogImg.width * scale);
        var h = Math.floor(frogImg.height * scale);
        fCvs.width = w;
        fCvs.height = h;
        fCtx.drawImage(frogImg, 0, 0, w, h);
      };

      /* Pixel-art frog fallback when image fails to load */
      frogImg.onerror = function () {
        var S = 3; // pixel size
        fCvs.width = 280;
        fCvs.height = 280;
        fCtx.imageSmoothingEnabled = false;

        function px(x, y, w, h, color) {
          fCtx.fillStyle = color;
          fCtx.fillRect(x * S, y * S, (w || 1) * S, (h || 1) * S);
        }

        // Body (green)
        var bodyColor = '#3a7a2a';
        var bodyLight = '#4a9a38';
        var eyeWhite = '#ffffff';
        var eyePupil = '#1a1a1a';
        var mouthColor = '#1a1a1a';
        var cheekColor = '#e8607a';

        // Main body
        for (var row = 4; row < 36; row++) {
          for (var col = 0; col < 40; col++) {
            // Approximate frog shape
            var inBody = false;
            // Head dome (rows 4-10)
            if (row >= 4 && row <= 10 && col >= 8 && col <= 31) inBody = true;
            if (row >= 4 && row <= 10 && col >= 6 && col <= 33 && row >= 7) inBody = true;
            // Body (rows 11-30)
            if (row >= 11 && row <= 30 && col >= 4 && col <= 35) inBody = true;
            // Body taper (rows 21-30)
            if (row >= 21 && row <= 30 && col >= 2 && col <= 37) inBody = true;
            // Bottom (rows 31-35)
            if (row >= 31 && row <= 35 && col >= 6 && col <= 33) inBody = true;

            if (inBody) {
              var isEdge = row === 4 || row === 35 || col === 4 || col === 35 ||
                (row >= 4 && row <= 10 && (col === 8 || col === 31));
              px(col, row, 1, 1, isEdge ? bodyLight : bodyColor);
            }
          }
        }

        // Eyes (white)
        px(12, 6, 4, 5, eyeWhite);
        px(24, 6, 4, 5, eyeWhite);

        // Pupils
        px(14, 8, 2, 3, eyePupil);
        px(26, 8, 2, 3, eyePupil);

        // Mouth (smile)
        for (var m = 14; m <= 25; m++) {
          px(m, 16, 1, 1, mouthColor);
        }
        px(13, 17, 1, 1, mouthColor);
        px(26, 17, 1, 1, mouthColor);
        px(14, 18, 1, 1, mouthColor);
        px(25, 18, 1, 1, mouthColor);

        // Cheeks
        px(8, 14, 3, 3, cheekColor);
        px(29, 14, 3, 3, cheekColor);

        // Legs
        // Left leg
        px(4, 28, 4, 3, bodyColor);
        px(3, 29, 1, 3, bodyColor);
        px(2, 30, 1, 3, bodyColor);
        // Right leg
        px(32, 28, 4, 3, bodyColor);
        px(36, 29, 1, 3, bodyColor);
        px(37, 30, 1, 3, bodyColor);

        // Belly highlight
        for (var b = 12; b <= 20; b++) {
          for (var c = 16; c <= 23; c++) {
            if (b >= 16 && b <= 18 && c >= 16 && c <= 23) {
              px(c, b, 1, 1, '#c0d8a0');
            }
          }
        }
      };
      frogImg.src = 'PNG/frog.png';

      /* FROG INTERACTION */
      var frogWrap = document.getElementById('frogWrap');
      var speechBubble = document.getElementById('speechBubble');
      var startBtn = document.getElementById('startBtn');
      var isDancing = false;
      var isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

      var FROG_LINES = ['呱', '呱呱!', '别点了~', '无水印!', 'Yapotato!', '下载吧!'];

      /* Entrance: remove pop class after animation ends */
      frogWrap.addEventListener('animationend', function (e) {
        if (e.animationName === 'pixel-pop') {
          frogWrap.classList.remove('frog-pop');
          frogWrap.classList.add('frog-idle');
        }
        if (e.animationName === 'frog-boing') {
          frogWrap.classList.remove('frog-boing');
        }
        if (e.animationName === 'frog-dance') {
          frogWrap.classList.remove('frog-dance');
          isDancing = false;
        }
      });

      /* Hover -> Boing (desktop only) */
      if (!isTouchDevice) {
        frogWrap.addEventListener('mouseenter', function () {
          if (isDancing) return;
          frogWrap.classList.remove('frog-idle');
          frogWrap.classList.add('frog-boing');
        });
      }

      /* Click -> Speech (desktop only — touch uses touchstart) */
      frogWrap.addEventListener('click', function () {
        if (isDancing || isTouchDevice) return;
        showSpeech();
      });

      /* Double-click -> Dance */
      frogWrap.addEventListener('dblclick', function (e) {
        if (isTouchDevice) return;
        e.preventDefault();
        if (isDancing) return;
        isDancing = true;
        frogWrap.classList.remove('frog-boing', 'frog-idle');
        speechBubble.classList.remove('show');
        frogWrap.classList.add('frog-dance');
      });

      /* Keyboard support */
      frogWrap.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          if (isDancing) return;
          frogWrap.classList.remove('frog-idle');
          frogWrap.classList.add('frog-boing');
          showSpeech();
        }
      });

      /* Touch device: tap triggers boing + speech */
      if (isTouchDevice) {
        frogWrap.addEventListener('touchstart', function (e) {
          if (isDancing) return;
          frogWrap.classList.remove('frog-idle');
          frogWrap.classList.add('frog-boing');
          showSpeech();
        }, { passive: true });
      }

      function showSpeech() {
        speechBubble.textContent = FROG_LINES[Math.floor(Math.random() * FROG_LINES.length)];
        speechBubble.classList.remove('show');
        // Force reflow to restart CSS transition
        void speechBubble.offsetWidth;
        speechBubble.classList.add('show');
        clearTimeout(speechBubble._timer);
        speechBubble._timer = setTimeout(function () {
          speechBubble.classList.remove('show');
        }, 1800);
      }

      /* ================================================================
         START BUTTON
         ================================================================ */
      startBtn.addEventListener('click', function () {
        window.location.href = 'select.html';
      });

      /* ================================================================
         YM CORNER INTERACTION
         ================================================================ */
      var ymCorner = document.getElementById('ymCorner');

      var YM_LINES = ['PPAT', '超级好！', 'Yapotato!', '压力！', '刀房来不来', '敬请期待', '进黑河'];

      ymCorner.addEventListener('mouseenter', function () {
        ymCorner.style.animation = 'ym-wiggle .5s ease-in-out infinite';
      });

      ymCorner.addEventListener('mouseleave', function () {
        if (!ymCorner.classList.contains('spin')) {
          ymCorner.style.animation = '';
        }
      });

      ymCorner.addEventListener('click', function (e) {
        e.stopPropagation();
        ymCorner.classList.add('spin');
        showYmTooltip();
        ymCorner.addEventListener('animationend', function handler() {
          if (ymCorner.classList.contains('spin')) {
            ymCorner.classList.remove('spin');
            ymCorner.style.animation = '';
          }
          ymCorner.removeEventListener('animationend', handler);
        });
      });

      ymCorner.addEventListener('dblclick', function (e) {
        e.preventDefault();
        window.open('/admin.html');
      });

      function showYmTooltip() {
        ymCorner.setAttribute('data-tooltip',
          YM_LINES[Math.floor(Math.random() * YM_LINES.length)]);
        ymCorner.classList.remove('tooltip-show');
        void ymCorner.offsetWidth;
        ymCorner.classList.add('tooltip-show');
        clearTimeout(ymCorner._tooltipTimer);
        ymCorner._tooltipTimer = setTimeout(function () {
          ymCorner.classList.remove('tooltip-show');
        }, 1800);
      }

    })();
  </script>

</body>

</html>
